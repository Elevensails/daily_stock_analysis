name: 盘中实时追踪
on:
  schedule:
    - cron: '45 1 * * 1-5'
    - cron: '30 2 * * 1-5'
    - cron: '30 5 * * 1-5'
    - cron: '30 6 * * 1-5'
    - cron: '55 6 * * 1-5'
  workflow_dispatch:
    inputs:
      time:
        description: '时段'
        required: true
        default: '09:45'
        type: choice
        options:
          - '09:45'
          - '10:30'
          - '13:30'
          - '14:30'
          - '14:55'
permissions:
  contents: write
jobs:
  analyze:
    runs-on: ubuntu-latest
    environment: STOCK_LIST
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install akshare
      - name: 执行盘中买卖剧本
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STOCK_LIST: ${{ vars.STOCK_LIST }}
        run: |
          TIME="${{ github.event.inputs.time || '' }}"
          if [ -z "$TIME" ]; then
            HOUR=$(date -u +%H)
            MIN=$(date -u +%M)
            if [ "$HOUR" = "01" ] && [ "$MIN" = "45" ]; then TIME="09:45"; fi
            if [ "$HOUR" = "02" ] && [ "$MIN" = "30" ]; then TIME="10:30"; fi
            if [ "$HOUR" = "05" ] && [ "$MIN" = "30" ]; then TIME="13:30"; fi
            if [ "$HOUR" = "06" ] && [ "$MIN" = "30" ]; then TIME="14:30"; fi
            if [ "$HOUR" = "06" ] && [ "$MIN" = "55" ]; then TIME="14:55"; fi
          fi
          if [ -z "$TIME" ]; then TIME="09:45"; fi
          echo "Running intraday playbook for time: $TIME"
          python scripts/intraday_playbook.py --time "$TIME"
