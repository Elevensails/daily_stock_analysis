name: A-Stock Daily Analysis

on:
  schedule:
    - cron: '0 1 * * 1-5'
    - cron: '30 1 * * 1-5'
    - cron: '0 4 * * 1-5'
    - cron: '30 6 * * 1-5'
    - cron: '0 10 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: run mode
        required: false
        default: full
      time_slot:
        description: target time slot HHMM (blank=auto)
        required: false
        default: ""

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Compute time slot and date
        run: |
          TSLOT="${{ inputs.time_slot }}"
          if [ -z "$TSLOT" ]; then
            TSLOT=$(python3 -c "from datetime import datetime,timezone,timedelta;print(datetime.now(timezone(timedelta(hours=8))).strftime('%H%M'))")
          fi
          DATE=$(python3 -c "from datetime import datetime,timezone,timedelta;print(datetime.now(timezone(timedelta(hours=8))).strftime('%Y%m%d'))")
          echo "TSLOT=$TSLOT" >> $GITHUB_ENV
          echo "DATE=$DATE" >> $GITHUB_ENV
          echo "Time slot: $TSLOT, Date: $DATE"
      - name: Run analysis and save report
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          STOCK_LIST: ${{ vars.STOCK_LIST }}
          GENERATION_BACKEND: litellm
        run: |
          mkdir -p reports
          python main.py --no-notify > reports/report_${TSLOT}_${DATE}.md 2>&1
          echo "main.py exit: $?" 
          # Ensure file always has content
          echo "# DeepSeek AI Analysis - ${TSLOT}" | cat - reports/report_${TSLOT}_${DATE}.md > tmp && mv tmp reports/report_${TSLOT}_${DATE}.md
          echo "File $(wc -c < reports/report_${TSLOT}_${DATE}.md) bytes"
          echo "=== reports/ ==="
          ls -la reports/
      - name: Deploy to GH Pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/deploy_pages.py
      - name: Verify deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sleep 3
          FILES=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/Elevensails/daily_stock_analysis/contents/?ref=gh-pages" \
            | python3 -c "import sys,json; [print(f['name']) for f in json.load(sys.stdin) if 'report_' in f['name']]")
          echo "Reports on gh-pages: $FILES"
