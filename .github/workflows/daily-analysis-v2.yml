name: A-Stock Daily Analysis

on:
  schedule:
    - cron: '0 1 * * 1-5'
    - cron: '30 1 * * 1-5'
    - cron: '0 4 * * 1-5'
    - cron: '30 6 * * 1-5'
    - cron: '0 10 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: run mode
        required: false
        default: full

jobs:
  analyze:
    runs-on: ubuntu-latest
    environment: STOCK_LIST
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Set time label
        run: |
          H=$(date -u +%H); M=$(date -u +%M)
          if [ "$H" = "01" ] && [ "$M" = "00" ]; then echo "TIME_LABEL=0900-early" >> $GITHUB_ENV; fi
          if [ "$H" = "01" ] && [ "$M" = "30" ]; then echo "TIME_LABEL=0930-open" >> $GITHUB_ENV; fi
          if [ "$H" = "04" ] && [ "$M" = "00" ]; then echo "TIME_LABEL=1200-noon" >> $GITHUB_ENV; fi
          if [ "$H" = "06" ] && [ "$M" = "30" ]; then echo "TIME_LABEL=1430-afternoon" >> $GITHUB_ENV; fi
          if [ "$H" = "10" ] && [ "$M" = "00" ]; then echo "TIME_LABEL=1800-close" >> $GITHUB_ENV; fi
          if [ -z "$TIME_LABEL" ]; then echo "TIME_LABEL=manual" >> $GITHUB_ENV; fi
      - name: Run analysis
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          STOCK_LIST: ${{ vars.STOCK_LIST }}
          GENERATION_BACKEND: litellm
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python main.py
      - name: Rename reports with time
        run: |
          T=0057; D=20260724
          for f in report_.md market_review_.md vibe_report.md; do
            src="reports/"
            if [ -f "" ]; then
              dst="reports/__.md"
              cp "" ""
              echo "renamed:  -> __.md"
            fi
          done
        run: |
          H=08; M=38
          T=""; D=20260724
          for f in reports/report_.md reports/market_review_.md; do
            [ -f "" ] && cp "" "__.md" && echo "renamed  -> __.md"
          done
      - name: Vibe-Trading 量化分析
        continue-on-error: true
        run: |
          pip install vibe-trading-ai --quiet 2>&1 | tail -1
          mkdir -p reports
          cat > reports/vibe_report.md << 'VEOF'
# Vibe-Trading 量化分析
> 量化引擎已安装。完整多智能体分析需 WorkBuddy MCP 交互触发。
> 每日 5 时段自动安装并输出占位报告。
VEOF
      - name: Deploy to GH Pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/deploy_pages.py
