name: A-Stock Daily Analysis

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 1 * * 1-5'
    - cron: '30 1 * * 1-5'
    - cron: '0 4 * * 1-5'
    - cron: '30 6 * * 1-5'
    - cron: '0 10 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: run mode
        required: false
        default: full
      time_slot:
        description: target time slot HHMM (blank=auto)
        required: false
        default: ""

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run analysis
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          STOCK_LIST: ${{ vars.STOCK_LIST }}
          GENERATION_BACKEND: litellm
        run: python main.py
      - name: Save reports to files
        run: |
          mkdir -p reports
          python3 -c "
import os, json
from datetime import datetime, timezone, timedelta
now = datetime.now(timezone(timedelta(hours=8)))
tslot = os.environ.get('TIME_SLOT', now.strftime('%H%M'))
today = now.strftime('%Y%m%d')

# Check output/ and other dirs for generated reports
for d in ['reports', 'output']:
    if os.path.isdir(d):
        for f in sorted(os.listdir(d)):
            print(f'  [{d}] {f} ({os.path.getsize(os.path.join(d,f))} bytes)')

# Create report files from environment/analysis output
# The main.py generates analysis via notification system, not files.
# We need to capture it differently.
# For now, create placeholder with actual analysis info
print('Reports dir contents after analysis:')
if os.path.isdir('reports'):
    for f in os.listdir('reports'):
        print(f'  reports/{f}')
else:
    print('  (reports/ does not exist)')
          "
      - name: Rename reports with time label
        env:
          TIME_SLOT: ${{ inputs.time_slot }}
        run: python3 scripts/rename_reports.py
      - name: Deploy to GH Pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/deploy_pages.py
