name: A-Stock Daily Analysis

on:
  schedule:
    - cron: '0 1 * * 1-5'
    - cron: '30 1 * * 1-5'
    - cron: '0 4 * * 1-5'
    - cron: '30 6 * * 1-5'
    - cron: '0 10 * * 1-5'
  workflow_dispatch:
    inputs:
      time_slot:
        description: target time slot HHMM (blank=auto)
        required: false
        default: ""

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Compute time slot
        run: |
          TSLOT="${{ inputs.time_slot }}"
          if [ -z "$TSLOT" ]; then
            TSLOT=$(python3 -c "from datetime import datetime,timezone,timedelta;print(datetime.now(timezone(timedelta(hours=8))).strftime('%H%M'))")
          fi
          DATE=$(python3 -c "from datetime import datetime,timezone,timedelta;print(datetime.now(timezone(timedelta(hours=8))).strftime('%Y%m%d'))")
          echo "TSLOT=$TSLOT" >> $GITHUB_ENV
          echo "DATE=$DATE" >> $GITHUB_ENV
      - name: Run analysis
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          STOCK_LIST: ${{ vars.STOCK_LIST }}
          GENERATION_BACKEND: litellm
          LITELLM_MODEL: deepseek/deepseek-v4-flash
        run: |
          mkdir -p reports
          python main.py --no-notify > reports/report_${TSLOT}_${DATE}.md 2>&1
          echo "main.py exit=$?, file=$(wc -c < reports/report_${TSLOT}_${DATE}.md) bytes"
      - name: Deploy to GH Pages
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python3 scripts/deploy_pages.py
