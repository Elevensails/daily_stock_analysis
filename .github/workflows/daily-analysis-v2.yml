name: A-Stock Daily Analysis

on:
  push:
    branches: [main]

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run analysis
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          STOCK_LIST: ${{ vars.STOCK_LIST }}
          GENERATION_BACKEND: litellm
        run: python main.py
      - name: Rename reports
        run: |
          python3 -c '
import os, glob, shutil
from datetime import datetime, timezone, timedelta
now = datetime.now(timezone(timedelta(hours=8)))
tslot = now.strftime("%H%M")
today = now.strftime("%Y%m%d")
for pattern in ["reports/report_*.md", "reports/market_review_*.md"]:
    for f in glob.glob(pattern):
        if f"_{tslot}_" in f:
            continue
        prefix = "report" if "/report_" in f else "market_review"
        dst = f"reports/{prefix}_{tslot}_{today}.md"
        shutil.copy(f, dst)
        print(f"renamed: {os.path.basename(f)} -> {os.path.basename(dst)}")
print("rename done")
          '
      - name: Deploy to GH Pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/deploy_pages.py
