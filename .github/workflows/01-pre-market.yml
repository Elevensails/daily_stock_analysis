name: 盘前舆情分析
on:
  schedule:
    - cron: '0 1 * * 1-5'     # 北京 09:00
    - cron: '21 1 * * 1-5'    # 北京 09:21
    - cron: '30 1 * * 1-5'    # 北京 09:30
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'stocks-only'
        type: choice
        options:
          - stocks-only
          - market-only
          - full

concurrency:
  group: pre-market
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    environment: STOCK_LIST
    timeout-minutes: 20

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 创建必要目录
        run: mkdir -p data logs reports

      - name: 执行盘前分析
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          STOCK_LIST: ${{ vars.STOCK_LIST }}
          GENERATION_BACKEND: litellm
          REPORT_TYPE: pre_market
        run: python main.py --no-market-review

      - name: 上传分析报告
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: pre-market-reports-${{ github.run_number }}
          path: |
            reports/
            logs/
          retention-days: 30

      - name: 部署到 GH Pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPORTS_DIR: reports
        run: python scripts/deploy_pages.py
